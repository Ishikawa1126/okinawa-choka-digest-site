name: Daily site build

on:
  push:
    branches:
      - main
  schedule:
    # 05:00 JST = 20:00 UTC on the previous day.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily Markdown post
        run: python scripts/generate_daily_post.py
        env:
          CATCH_MANUAL_SUMMARY: ${{ vars.CATCH_MANUAL_SUMMARY }}

      - name: Commit generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts
          git diff --cached --quiet || git commit -m "Add daily fishing digest"
          git push

      - name: Build static site
        run: python build.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
